<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>延时摄影工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg-blur"></div>
  <nav class="tabs">
    <button class="tab active" data-tab="pipeline">延时流水线</button>
    <button class="tab" data-tab="selector">照片筛选</button>
    <button class="tab" data-tab="social">成片转社媒</button>
    <span id="conn-status" class="status">连接中…</span>
  </nav>
  <main>
    <section id="pipeline" class="panel active">
      <div class="pipeline-wrap">
      <div class="pipeline-layout">
      <div class="pipeline-main">

      <!-- ① 素材与流程 -->
      <div class="glass form-section">
        <h2 class="section-title">素材与流程</h2>
        <div class="field">
          <label>工作流模板</label>
          <select id="workflow_select"></select>
        </div>
        <details class="workflow-builder">
          <summary>自建工作流</summary>
          <div class="wf-checks">
            <label><input type="checkbox" class="wf-stage" value="BR" checked /> BR</label>
            <label><input type="checkbox" class="wf-stage" value="LRT" checked /> LRT</label>
            <label><input type="checkbox" class="wf-stage" value="AE" checked /> AE</label>
            <label><input type="checkbox" class="wf-stage" value="导出" checked /> 导出</label>
          </div>
          <div class="path-input">
            <input id="wf_name" type="text" placeholder="模板名" />
            <button type="button" id="wf_save" class="btn-browse">保存模板</button>
          </div>
          <div id="wf-error" class="error-text"></div>
        </details>
        <div class="field">
          <label>RAW 文件夹</label>
          <div class="path-input">
            <input id="raw_folder" type="text" placeholder="点右侧选择文件夹" />
            <button type="button" class="btn-browse" data-target="raw_folder">选择…</button>
            <button type="button" class="btn-browse btn-preview" data-folder="raw_folder">预览</button>
          </div>
        </div>
        <div class="field">
          <label>输出路径</label>
          <div class="path-input">
            <input id="output_path" type="text" placeholder="点右侧选择文件夹" />
            <button type="button" class="btn-browse" data-target="output_path">选择…</button>
          </div>
        </div>
        <div id="material-info" class="material-info hidden">
          <div class="material-title">素材信息（自动识别）</div>
          <div id="material-rows"></div>
        </div>
      </div>

      <!-- ② 渲染参数 -->
      <div class="glass form-section">
        <h2 class="section-title">渲染参数</h2>
        <div class="field">
          <label>帧率 fps（可自填）</label>
          <input id="fps" type="number" min="1" max="120" step="1" value="24" list="fps-presets" />
          <datalist id="fps-presets">
            <option value="12"></option><option value="15"></option><option value="24"></option>
            <option value="25"></option><option value="30"></option><option value="48"></option>
            <option value="50"></option><option value="60"></option><option value="90"></option>
            <option value="120"></option>
          </datalist>
        </div>
        <div class="field switch-field">
          <label for="stabilize_enabled">AE 增稳 (变形稳定器)</label>
          <input id="stabilize_enabled" type="checkbox" />
        </div>
        <div id="stabilize-fields" class="hidden">
          <div class="row">
            <div class="field">
              <label>结果</label>
              <select id="stabilize_result">
                <option value="smooth">平滑运动</option>
                <option value="none">无运动</option>
              </select>
            </div>
            <div class="field">
              <label>平滑度 (0–100)</label>
              <input id="stabilize_smoothness" type="number" min="0" max="100" value="50" />
            </div>
          </div>
          <div class="field">
            <label>方法</label>
            <select id="stabilize_method">
              <option value="subspace">子空间变形</option>
              <option value="perspective">透视</option>
              <option value="pos_scale_rot">位置、缩放、旋转</option>
              <option value="position">位置</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ③ 成片导出 -->
      <div class="glass form-section">
        <h2 class="section-title">成片导出</h2>
        <div class="field">
          <label>母版</label>
          <div class="hint-line">自动保留 ProRes 母版 → timelapse_master.mov</div>
        </div>
        <div class="row">
          <div class="field">
            <label>社媒格式</label>
            <select id="social_format">
              <option value="H.265">H.265（更小）</option>
              <option value="H.264">H.264（最兼容）</option>
            </select>
          </div>
          <div class="field">
            <label>画幅</label>
            <select id="social_aspect">
              <option value="9:16">9:16 竖（抖音/小红书）</option>
              <option value="3:4">3:4 竖（小红书）</option>
              <option value="16:9">16:9 横（B站/横屏）</option>
              <option value="1:1">1:1 方</option>
              <option value="3:2">3:2 原始（不裁）</option>
            </select>
          </div>
          <div class="field">
            <label>分辨率</label>
            <select id="social_resolution">
              <option value="1080p">1080p</option>
              <option value="720p">720p</option>
              <option value="4K">4K</option>
            </select>
          </div>
        </div>
        <div id="social-preview" class="hint-line"></div>
        <div class="row">
          <div class="field">
            <label>运镜</label>
            <select id="motion_type">
              <option value="none">无</option>
              <option value="kenburns">Ken Burns 推拉</option>
              <option value="pan">平移 Pan</option>
              <option value="sweep">竖屏横扫</option>
            </select>
          </div>
          <div class="field">
            <label>方向</label>
            <select id="motion_direction"></select>
          </div>
          <div class="field">
            <label>强度</label>
            <select id="motion_intensity">
              <option value="light">轻</option>
              <option value="medium" selected>中</option>
              <option value="strong">明显</option>
            </select>
          </div>
        </div>
        <div id="motion-box-row" class="field hidden">
          <button type="button" id="btn-pick-box" class="btn-browse">选放大区域…</button>
          <span id="motion-box-hint" class="hint-line"></span>
        </div>
        <div class="field switch-field">
          <label for="motion_subject">自动对准主体（Vision 显著性）</label>
          <input id="motion_subject" type="checkbox" />
        </div>
      </div>

      <!-- ④ 执行 -->
      <div class="glass form-section">
        <h2 class="section-title">执行</h2>
        <div class="pipeline-actions">
          <button id="btn-start" class="btn btn-primary">开始处理</button>
          <button id="btn-continue" class="btn btn-ghost hidden">我已在 LRT 完成，继续</button>
          <button id="btn-reset" class="btn btn-ghost hidden">重新开始（换素材）</button>
        </div>
        <div id="progress-wrap" class="progress-wrap hidden">
          <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          <div id="progress-text" class="hint-line"></div>
        </div>
        <div id="pipeline-error" class="error-text"></div>
        <div id="pipeline-notice" class="notice-text hidden"></div>
        <div id="stage-guide" class="stage-guide hidden"></div>
        <div class="board" id="stage-board">
          <div class="stage" data-stage="BR"><div class="stage-name">BR</div><div class="stage-hint">手动·ACR</div></div>
          <div class="stage" data-stage="LRT"><div class="stage-name">LRT</div><div class="stage-hint">手动操作</div></div>
          <div class="stage" data-stage="AE"><div class="stage-name">AE</div><div class="stage-hint">渲染序列</div></div>
          <div class="stage" data-stage="导出"><div class="stage-name">导出</div><div class="stage-hint">母版+社媒</div></div>
        </div>
      </div>

      </div>

      <div class="glass preview-panel hidden" id="preview-panel">
        <div class="preview-head">
          <span id="preview-info">预览</span>
          <button type="button" id="preview-play" class="btn-browse">▶ 播放</button>
        </div>
        <div class="preview-strip" id="preview-strip"></div>
        <img id="preview-stage" class="preview-stage hidden" alt="预览" />
      </div>
      </div>
      </div>
    </section>
    <section id="selector" class="panel">
      <h1>照片筛选</h1>
      <p>（占位 — 由后续计划实现）</p>
    </section>
    <section id="social" class="panel">
      <div class="pipeline-wrap">
      <div class="glass form-section">
        <h2 class="section-title">成片转社媒</h2>
        <div class="field">
          <label>成片文件（mov）</label>
          <div class="path-input">
            <input id="b_src" type="text" placeholder="点右侧选择成片" />
            <button type="button" id="b_choose" class="btn-browse">选择…</button>
          </div>
        </div>
        <div class="row">
          <div class="field"><label>社媒格式</label>
            <select id="b_social_format"><option value="H.265">H.265（更小）</option><option value="H.264">H.264（最兼容）</option></select>
          </div>
          <div class="field"><label>画幅</label>
            <select id="b_social_aspect">
              <option value="9:16">9:16 竖（抖音/小红书）</option>
              <option value="3:4">3:4 竖（小红书）</option>
              <option value="16:9">16:9 横（B站/横屏）</option>
              <option value="1:1">1:1 方</option>
              <option value="3:2">3:2 原始（不裁）</option>
            </select>
          </div>
          <div class="field"><label>分辨率</label>
            <select id="b_social_resolution"><option value="1080p">1080p</option><option value="720p">720p</option><option value="4K">4K</option></select>
          </div>
        </div>
        <div id="b_social-preview" class="hint-line"></div>
        <div class="row">
          <div class="field"><label>运镜</label>
            <select id="b_motion_type"><option value="none">无</option><option value="kenburns">Ken Burns 推拉</option><option value="pan">平移 Pan</option><option value="sweep">竖屏横扫</option></select>
          </div>
          <div class="field"><label>方向</label><select id="b_motion_direction"></select></div>
          <div class="field"><label>强度</label>
            <select id="b_motion_intensity"><option value="light">轻</option><option value="medium" selected>中</option><option value="strong">明显</option></select>
          </div>
        </div>
        <div id="b_motion-box-row" class="field hidden">
          <button type="button" id="b_btn-pick-box" class="btn-browse">选放大区域…</button>
          <span id="b_motion-box-hint" class="hint-line"></span>
        </div>
        <div class="field switch-field">
          <label for="b_motion_subject">自动对准主体（Vision 显著性）</label>
          <input id="b_motion_subject" type="checkbox" />
        </div>
        <div class="pipeline-actions">
          <button id="b_convert" class="btn btn-primary">转换为社媒版</button>
        </div>
        <div id="b_result" class="hint-line"></div>
        <div id="b_error" class="error-text"></div>
      </div>
      </div>
    </section>
  </main>
  <div id="crop-modal" class="modal hidden">
    <div class="modal-card glass">
      <div class="modal-head">框选放大区域（Ken Burns 终点）</div>
      <div id="crop-stage" class="crop-stage">
        <img id="crop-img" alt="底图" />
        <div id="crop-box" class="crop-box"></div>
      </div>
      <div class="modal-actions">
        <button type="button" id="crop-reset" class="btn btn-ghost">重置为自动</button>
        <button type="button" id="crop-cancel" class="btn btn-ghost">取消</button>
        <button type="button" id="crop-ok" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>
  <script src="preview.js"></script>
  <script src="pipeline.js"></script>
  <script src="social_tab.js"></script>
  <script src="app.js"></script>
</body>
</html>
