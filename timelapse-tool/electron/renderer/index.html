<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>延时摄影工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="tabs">
    <button class="tab active" data-tab="pipeline">延时流水线</button>
    <button class="tab" data-tab="selector">照片筛选</button>
    <span id="conn-status" class="status">连接中…</span>
  </nav>
  <main>
    <section id="pipeline" class="panel active">
      <div class="pipeline-wrap">
      <div class="glass pipeline-form">
        <h1>延时流水线</h1>
        <div class="field">
          <label>工作流模板</label>
          <select id="workflow_select"></select>
        </div>
        <details class="workflow-builder">
          <summary>自建工作流</summary>
          <div class="wf-checks">
            <label><input type="checkbox" class="wf-stage" value="BR" checked /> BR</label>
            <label><input type="checkbox" class="wf-stage" value="LRT" checked /> LRT</label>
            <label><input type="checkbox" class="wf-stage" value="AE" checked /> AE</label>
            <label><input type="checkbox" class="wf-stage" value="PR" checked /> PR</label>
          </div>
          <div class="path-input">
            <input id="wf_name" type="text" placeholder="模板名" />
            <button type="button" id="wf_save" class="btn-browse">保存模板</button>
          </div>
          <div id="wf-error" class="error-text"></div>
        </details>
        <div class="field">
          <label>RAW 文件夹</label>
          <div class="path-input">
            <input id="raw_folder" type="text" placeholder="点右侧选择文件夹" />
            <button type="button" class="btn-browse" data-target="raw_folder">选择…</button>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>相机机型</label>
            <select id="camera_name"></select>
          </div>
          <div class="field">
            <label>分辨率</label>
            <select id="resolution"></select>
          </div>
        </div>
        <div class="field">
          <label>LRT 导出序列文件夹</label>
          <div class="path-input">
            <input id="lrt_export_folder" type="text" placeholder="LRT 导出图像序列的目标文件夹" />
            <button type="button" class="btn-browse" data-target="lrt_export_folder">选择…</button>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>帧率 fps（可自填）</label>
            <input id="fps" type="number" min="1" max="120" step="1" value="24" list="fps-presets" />
            <datalist id="fps-presets">
              <option value="12"></option>
              <option value="15"></option>
              <option value="24"></option>
              <option value="25"></option>
              <option value="30"></option>
              <option value="48"></option>
              <option value="50"></option>
              <option value="60"></option>
              <option value="90"></option>
              <option value="120"></option>
            </datalist>
          </div>
          <div class="field">
            <label>导出模式</label>
            <select id="export_mode">
              <option value="preset">预设</option>
              <option value="manual">手动</option>
            </select>
          </div>
        </div>
        <div class="field" id="preset-field">
          <label>导出预设</label>
          <select id="export_preset"></select>
        </div>

        <div id="manual-fields" class="hidden">
          <div class="field">
            <label>编码</label>
            <select id="manual_codec">
              <option value="ProRes">ProRes (MOV)</option>
              <option value="H.264">H.264 (MP4)</option>
              <option value="H.265">H.265 (MP4)</option>
            </select>
          </div>
          <div class="field" id="prores-field">
            <label>ProRes 档位</label>
            <select id="prores_profile">
              <option>Proxy</option><option>LT</option><option>422</option>
              <option selected>422 HQ</option><option>4444</option><option>4444 XQ</option>
            </select>
          </div>
          <div class="row" id="bitrate-row">
            <div class="field">
              <label>目标码率 (Mbps)</label>
              <input id="bitrate_mbps" type="number" min="1" max="500" value="80" />
            </div>
            <div class="field" id="h264-quality-field">
              <label>质量档</label>
              <select id="h264_quality">
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
              </select>
            </div>
            <div class="field hidden" id="h265-depth-field">
              <label>位深</label>
              <select id="h265_bit_depth">
                <option value="8">8bit</option>
                <option value="10" selected>10bit</option>
              </select>
            </div>
          </div>
        </div>
        <div class="field">
          <label>输出路径</label>
          <div class="path-input">
            <input id="output_path" type="text" placeholder="点右侧选择文件夹" />
            <button type="button" class="btn-browse" data-target="output_path">选择…</button>
          </div>
        </div>
        <div class="field switch-field">
          <label for="stabilize_enabled">AE 增稳 (变形稳定器)</label>
          <input id="stabilize_enabled" type="checkbox" />
        </div>
        <div id="stabilize-fields" class="hidden">
          <div class="row">
            <div class="field">
              <label>结果</label>
              <select id="stabilize_result">
                <option value="smooth">平滑运动</option>
                <option value="none">无运动</option>
              </select>
            </div>
            <div class="field">
              <label>平滑度 (0–100)</label>
              <input id="stabilize_smoothness" type="number" min="0" max="100" value="50" />
            </div>
          </div>
          <div class="field">
            <label>方法</label>
            <select id="stabilize_method">
              <option value="subspace">子空间变形</option>
              <option value="perspective">透视</option>
              <option value="pos_scale_rot">位置、缩放、旋转</option>
              <option value="position">位置</option>
            </select>
          </div>
        </div>
        <div class="pipeline-actions">
          <button id="btn-start" class="btn btn-primary">开始处理</button>
          <button id="btn-continue" class="btn btn-ghost hidden">我已在 LRT 完成，继续</button>
        </div>
        <div id="pipeline-error" class="error-text"></div>
      </div>

      <div class="board" id="stage-board">
        <div class="stage" data-stage="BR"><div class="stage-name">BR</div><div class="stage-hint">手动·ACR</div></div>
        <div class="stage" data-stage="LRT"><div class="stage-name">LRT</div><div class="stage-hint">手动操作</div></div>
        <div class="stage" data-stage="AE"><div class="stage-name">AE</div><div class="stage-hint">渲染序列</div></div>
        <div class="stage" data-stage="PR"><div class="stage-name">PR</div><div class="stage-hint">导出成片</div></div>
      </div>
      </div>
    </section>
    <section id="selector" class="panel">
      <h1>照片筛选</h1>
      <p>（占位 — 由后续计划实现）</p>
    </section>
  </main>
  <script src="pipeline.js"></script>
  <script src="app.js"></script>
</body>
</html>
